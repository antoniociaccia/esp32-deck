name: Release OTA

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Optional release tag (defaults to v<FW_VERSION>)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-ota:
    runs-on: ubuntu-latest

    env:
      FQBN: esp32:esp32:esp32s3
      ARDUINO_LIBRARY_DIR: /home/runner/Arduino/libraries
      OTA_MANIFEST_NAME: manifest-stable.json
      OTA_MIN_BATTERY_PERCENT: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32@3.3.7 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Install libraries
        run: |
          arduino-cli lib install "lvgl@8.4.0"
          arduino-cli lib install "TFT_eSPI@2.5.43"

      - name: Install repository libraries
        run: bash ./scripts/install-repo-libraries.sh

      - name: Apply TFT_eSPI setup
        run: bash ./scripts/apply-tftespi-setup.sh

      - name: Resolve release tag
        id: resolve_release
        run: |
          FW_VERSION="$(sed -n 's/.*FW_VERSION = "\([^"]*\)".*/\1/p' src/version.h | head -n 1)"
          EXPECTED_TAG="v${FW_VERSION}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.tag_name }}"
            if [[ -z "${TAG_NAME}" ]]; then
              TAG_NAME="${EXPECTED_TAG}"
            fi
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAG_NAME="${EXPECTED_TAG}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Release tag ${TAG_NAME} does not match src/version.h (${EXPECTED_TAG})"
            exit 1
          fi

          echo "FW_VERSION=${FW_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Check if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip automatic release on main when version already exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.release_exists.outputs.exists == 'true'
        run: |
          echo "Release ${RELEASE_TAG} already exists, skipping automatic publish from main."

      - name: Validate release tag matches firmware version
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || steps.release_exists.outputs.exists != 'true'
        run: |
          EXPECTED_TAG="v${FW_VERSION}"
          if [[ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag ${RELEASE_TAG} does not match src/version.h (${EXPECTED_TAG})"
            exit 1
          fi

      - name: Build OTA assets
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || steps.release_exists.outputs.exists != 'true'
        env:
          OTA_TAG_NAME: ${{ env.RELEASE_TAG }}
          OTA_BIN_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}
        run: bash ./scripts/build-ota-release.sh

      - name: Publish GitHub release assets
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || steps.release_exists.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BIN_NAME="$(find .build/ota-release -maxdepth 1 -name 'esp32-deck-*.bin' -type f | xargs -n 1 basename)"
          MANIFEST_PATH=".build/ota-release/${OTA_MANIFEST_NAME}"
          BIN_PATH=".build/ota-release/${BIN_NAME}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${BIN_PATH}" "${MANIFEST_PATH}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${BIN_PATH}" "${MANIFEST_PATH}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes "OTA firmware release ${RELEASE_TAG}"
          fi
